<style>
:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --surface-2: #f8fafc;
  --ink: #0f172a;
  --ink-2: #475569;
  --ink-3: #94a3b8;
  --line: #e2e8f0;
  --line-2: #cbd5e1;

  --primary: #0f172a;
  --primary-2: #1e293b;
  --accent: #f59e0b;

  --red: #dc2626;
  --red-bg: #fef2f2;
  --red-line: #fecaca;
  --orange: #ea580c;
  --orange-bg: #fff7ed;
  --orange-line: #fed7aa;
  --green: #059669;
  --green-bg: #ecfdf5;
  --green-line: #a7f3d0;
  --blue: #2563eb;
  --blue-bg: #eff6ff;
  --blue-line: #bfdbfe;
  --purple: #7c3aed;
  --purple-bg: #f5f3ff;
  --purple-line: #ddd6fe;

  --radius: 14px;
  --radius-sm: 10px;
  --radius-lg: 20px;
  --shadow-sm: 0 1px 2px rgba(15,23,42,.06), 0 1px 1px rgba(15,23,42,.04);
  --shadow-md: 0 4px 12px rgba(15,23,42,.08), 0 1px 4px rgba(15,23,42,.06);
  --shadow-lg: 0 12px 28px rgba(15,23,42,.16), 0 4px 12px rgba(15,23,42,.10);

  --safe-top: env(safe-area-inset-top, 0);
  --safe-bottom: env(safe-area-inset-bottom, 0);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, "Helvetica Neue", system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button, input, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}
button { border: none; background: none; cursor: pointer; }
input, textarea, select { border: none; outline: none; background: transparent; }

/* ============ HEADER ============ */
.app-header {
  background: linear-gradient(180deg, var(--primary) 0%, var(--primary-2) 100%);
  color: #fff;
  padding: calc(var(--safe-top) + 14px) 16px 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 0 rgba(0,0,0,.05);
}
.app-header__row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.app-header__title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.app-header__logo {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: var(--accent);
  color: var(--primary);
  display: grid;
  place-items: center;
  font-weight: 900;
  font-size: 16px;
}
.app-header__actions { display: flex; gap: 6px; }
.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: rgba(255,255,255,.10);
  color: #fff;
  font-size: 17px;
  transition: background .15s, transform .1s;
}
.icon-btn:active { background: rgba(255,255,255,.20); transform: scale(0.92); }
.icon-btn--accent {
  background: var(--accent);
  color: var(--primary);
}
.icon-btn--accent:active { background: #fbbf24; }

.app-header__file {
  margin-top: 8px;
  font-size: 12px;
  color: rgba(255,255,255,.75);
  display: flex;
  align-items: center;
  gap: 6px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.dot.empty { background: var(--ink-3); }

/* ============ TABS ============ */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: calc(var(--safe-top) + 76px);
  z-index: 90;
  padding: 6px 6px 0;
  gap: 2px;
}
.tab {
  flex: 1;
  padding: 12px 4px 10px;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-2);
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  min-height: 66px;
  border-radius: 10px 10px 0 0;
  transition: background .15s, color .15s;
}
.tab:active { background: var(--surface-2); }
.tab__icon { font-size: 22px; line-height: 1; }
.tab__label { display: flex; align-items: center; gap: 5px; }
.tab__count {
  background: var(--line);
  color: var(--ink-2);
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 10px;
  font-weight: 700;
  min-width: 20px;
  line-height: 1.4;
}
.tab.active {
  color: var(--ink);
}
.tab.active .tab__count {
  background: var(--accent);
  color: var(--primary);
}
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 25%;
  right: 25%;
  height: 3px;
  border-radius: 3px 3px 0 0;
  background: var(--ink);
}

/* ============ FILTERS ============ */
.filters {
  display: flex;
  gap: 7px;
  padding: 12px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  align-items: center;
}
.filters::-webkit-scrollbar { display: none; }
.chip {
  padding: 9px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  background: var(--surface-2);
  color: var(--ink-2);
  border: 1px solid var(--line);
  transition: all .15s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  min-height: 36px;
}
.chip:active { transform: scale(0.95); }
.chip.active {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}
.chip__count {
  background: rgba(0,0,0,.08);
  padding: 0 5px;
  border-radius: 8px;
  font-size: 10px;
  font-weight: 700;
}
.chip.active .chip__count {
  background: rgba(255,255,255,.20);
}

/* Advanced filter trigger button */
.chip--adv {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}
.chip--adv.has-active {
  background: var(--accent);
  color: var(--primary);
  border-color: var(--accent);
}

/* Active filter summary strip */
.active-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px 12px 0;
  background: var(--bg);
}
.active-filter-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 6px 4px 10px;
  background: var(--ink);
  color: #fff;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 600;
}
.active-filter-chip__x {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(255,255,255,.20);
  display: grid;
  place-items: center;
  font-size: 11px;
  cursor: pointer;
}
.active-filter-chip__clear {
  background: var(--red-bg);
  color: var(--red);
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 700;
  border: 1px solid var(--red-line);
}

/* Advanced filter modal content */
.adv-section {
  margin-bottom: 18px;
}
.adv-section__title {
  font-size: 11.5px;
  font-weight: 700;
  color: var(--ink-2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.adv-options {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.adv-opt {
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--surface-2);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: all .15s;
}
.adv-opt:active { transform: scale(0.97); }
.adv-opt.active {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
  font-weight: 600;
}
.adv-opt__count {
  background: rgba(0,0,0,.08);
  font-size: 10.5px;
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 700;
}
.adv-opt.active .adv-opt__count {
  background: rgba(255,255,255,.20);
}

.sort-row {
  display: flex;
  gap: 8px;
  align-items: stretch;
}
.sort-select {
  flex: 1;
  padding: 11px 12px;
  border: 1px solid var(--line);
  background: var(--surface-2);
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
}
.sort-dir {
  width: 50px;
  border: 1px solid var(--line);
  background: var(--surface-2);
  border-radius: 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  transition: all .15s;
}
.sort-dir:active { transform: scale(0.95); }

/* ============ SEARCH ============ */
.search {
  padding: 10px 12px 0;
  background: var(--bg);
}
.search__input {
  width: 100%;
  padding: 11px 14px 11px 40px;
  background: var(--surface);
  border-radius: 999px;
  border: 1px solid var(--line);
  font-size: 14px;
  box-shadow: var(--shadow-sm);
  transition: border-color .15s, box-shadow .15s;
}
.search__input:focus {
  border-color: var(--ink);
  box-shadow: 0 0 0 3px rgba(15,23,42,.08);
}
.search__wrap {
  position: relative;
}
.search__icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-3);
  font-size: 14px;
  pointer-events: none;
}

/* ============ MAIN ============ */
main {
  padding: 12px 12px calc(100px + var(--safe-bottom));
  min-height: calc(100vh - 200px);
}

/* ============ EMPTY ============ */
.empty {
  text-align: center;
  padding: 60px 24px;
  color: var(--ink-3);
}
.empty__icon {
  font-size: 56px;
  margin-bottom: 12px;
  opacity: 0.5;
}
.empty__title {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink-2);
  margin-bottom: 4px;
}
.empty__hint {
  font-size: 13px;
  color: var(--ink-3);
}

/* ============ GROUP HEADER ============ */
.group {
  margin-bottom: 18px;
  animation: fadeUp .35s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.group__header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 4px 8px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-2);
}
.group__count {
  background: var(--line);
  color: var(--ink-2);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0;
}

/* ============ TASK CARD ============ */
.task {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 14px 12px;
  margin-bottom: 8px;
  border: 1px solid var(--line);
  position: relative;
  box-shadow: var(--shadow-sm);
  transition: transform .15s, box-shadow .15s;
}
.task:active { transform: scale(0.99); }
.task::before {
  content: '';
  position: absolute;
  left: 0;
  top: 14px;
  bottom: 14px;
  width: 3px;
  background: var(--ink-3);
  border-radius: 0 3px 3px 0;
}
.task--urgent::before { background: var(--red); }
.task--normal::before { background: var(--orange); }
.task--low::before    { background: var(--green); }
.task--done {
  opacity: 0.65;
  background: var(--surface-2);
}
.task--done::before { background: var(--ink-3); }
.task--done .task__title {
  text-decoration: line-through;
  color: var(--ink-2);
}
.task--star {
  background: linear-gradient(180deg, #fffbeb 0%, var(--surface) 60%);
}

.task__top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
}
.task__title {
  font-size: 14.5px;
  font-weight: 600;
  line-height: 1.35;
  color: var(--ink);
  word-break: break-word;
  flex: 1;
}
.task__star {
  color: var(--accent);
  font-size: 16px;
  margin-top: 1px;
  flex-shrink: 0;
}

.task__meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 8px;
  font-size: 11.5px;
  color: var(--ink-2);
  margin-top: 8px;
}
.meta-item {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
}
.meta-item__icon { opacity: 0.7; }

.task__sub {
  margin-top: 8px;
  font-size: 12.5px;
  color: var(--ink-2);
  white-space: pre-wrap;
  line-height: 1.5;
}

.task__subs {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px dashed var(--line);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.subitem {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  font-size: 13px;
}
.subitem__check {
  width: 18px;
  height: 18px;
  border: 1.5px solid var(--line-2);
  border-radius: 5px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  cursor: pointer;
  transition: all .15s;
}
.subitem--done .subitem__check {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}
.subitem__text { flex: 1; word-break: break-word; }
.subitem--done .subitem__text {
  text-decoration: line-through;
  color: var(--ink-3);
}

/* Status / priority pills */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 10.5px;
  font-weight: 600;
}
.pill--todo  { background: var(--blue-bg);   color: var(--blue);   }
.pill--doing { background: var(--orange-bg); color: var(--orange); }
.pill--done  { background: var(--green-bg);  color: var(--green);  }
.pill--archived { background: var(--purple-bg); color: var(--purple); }
.pill--overdue { background: var(--red-bg); color: var(--red); }
.pill--today { background: var(--orange-bg); color: var(--orange); }
.pill--soon { background: var(--blue-bg); color: var(--blue); }

/* Actions */
.task__actions {
  display: flex;
  gap: 6px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.action-btn {
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: transform .1s, opacity .15s;
}
.action-btn:active { transform: scale(0.95); }
.action-btn--ghost  { background: var(--surface-2); color: var(--ink-2); border: 1px solid var(--line); }
.action-btn--primary { background: var(--ink); color: #fff; }
.action-btn--success { background: var(--green); color: #fff; }
.action-btn--warn   { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-line); }
.action-btn--danger { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-line); }

/* ============ FAB ============ */
.fab {
  position: fixed;
  bottom: calc(20px + var(--safe-bottom));
  right: 18px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--accent);
  font-size: 26px;
  font-weight: 300;
  display: grid;
  place-items: center;
  box-shadow: 0 6px 20px rgba(15,23,42,.4), 0 2px 6px rgba(15,23,42,.2);
  z-index: 50;
  transition: transform .15s;
}
.fab:active { transform: scale(0.92); }

/* ============ MODAL ============ */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.55);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: flex-end;
  animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-backdrop.show { display: flex; }
.modal {
  background: var(--surface);
  width: 100%;
  max-height: 92vh;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  animation: slideUp .3s cubic-bezier(0.32, 0.72, 0.0, 1);
  padding-bottom: var(--safe-bottom);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal__handle {
  width: 36px;
  height: 4px;
  background: var(--line-2);
  border-radius: 2px;
  margin: 8px auto 4px;
  flex-shrink: 0;
}
.modal__head {
  padding: 12px 16px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.modal__title {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
}
.modal__body {
  padding: 14px 16px;
  overflow-y: auto;
  flex: 1;
}
.modal__footer {
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  border-top: 1px solid var(--line);
  background: var(--surface-2);
  flex-shrink: 0;
}
.modal__footer .action-btn { flex: 1; justify-content: center; padding: 11px; font-size: 14px; }

.field {
  margin-bottom: 14px;
}
.field__label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--ink-2);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.field__input,
.field__textarea,
.field__select {
  width: 100%;
  padding: 10px 12px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  font-size: 14px;
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.field__input:focus,
.field__textarea:focus,
.field__select:focus {
  border-color: var(--ink);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(15,23,42,.07);
}
.field__textarea { min-height: 70px; resize: vertical; }
.field__row { display: flex; gap: 8px; }
.field__row > * { flex: 1; }

.priority-pills {
  display: flex;
  gap: 6px;
}
.priority-pills label {
  flex: 1;
  text-align: center;
  padding: 10px 6px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  background: var(--surface-2);
  color: var(--ink-2);
  cursor: pointer;
  transition: all .15s;
}
.priority-pills input { display: none; }
.priority-pills input:checked + label.p-urgent { background: var(--red); color: #fff; border-color: var(--red); }
.priority-pills input:checked + label.p-normal { background: var(--orange); color: #fff; border-color: var(--orange); }
.priority-pills input:checked + label.p-low    { background: var(--green); color: #fff; border-color: var(--green); }

/* ============ TOAST ============ */
.toast {
  position: fixed;
  bottom: calc(96px + var(--safe-bottom));
  left: 50%;
  transform: translate(-50%, 16px);
  background: var(--ink);
  color: #fff;
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s, transform .25s;
  max-width: 92%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  box-shadow: var(--shadow-lg);
}
.toast.show {
  opacity: 1;
  transform: translate(-50%, 0);
}

/* ============ INSTALL HINT ============ */
.install-hint {
  position: fixed;
  bottom: calc(20px + var(--safe-bottom));
  left: 12px;
  right: 12px;
  background: var(--ink);
  color: #fff;
  padding: 12px 14px;
  border-radius: var(--radius);
  z-index: 60;
  display: none;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow-lg);
  animation: slideUp .3s ease;
}
.install-hint.show { display: flex; }
.install-hint__text {
  flex: 1;
  font-size: 12.5px;
  line-height: 1.4;
}
.install-hint__close {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,.15);
  color: #fff;
  display: grid;
  place-items: center;
  font-size: 14px;
  flex-shrink: 0;
}

input[type="file"] { display: none; }

/* small screens / compact */
@media (max-width: 380px) {
  body { font-size: 14px; }
  .task__title { font-size: 14px; }
  .tab { font-size: 12px; }
}

/* ============ ADD-TO-HOME GUIDE ============ */
.guide-step {
  display: flex;
  gap: 12px;
  padding: 14px;
  background: var(--surface-2);
  border-radius: var(--radius);
  margin-bottom: 10px;
  border: 1px solid var(--line);
}
.guide-step__num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--accent);
  display: grid;
  place-items: center;
  font-weight: 800;
  font-size: 14px;
  flex-shrink: 0;
}
.guide-step__body {
  flex: 1;
  font-size: 14px;
  line-height: 1.5;
  color: var(--ink);
}
.guide-step__body b { font-weight: 700; }
.guide-step__body code {
  background: var(--ink);
  color: #fff;
  padding: 1px 7px;
  border-radius: 5px;
  font-size: 12.5px;
  font-family: ui-monospace, SF Mono, monospace;
  display: inline-block;
}
.guide-section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  margin: 16px 0 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.guide-section-title:first-child { margin-top: 0; }
.guide-note {
  background: var(--blue-bg);
  border: 1px solid var(--blue-line);
  color: var(--blue);
  padding: 10px 12px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-top: 10px;
  line-height: 1.5;
}
.guide-warn {
  background: var(--orange-bg);
  border: 1px solid var(--orange-line);
  color: var(--orange);
  padding: 10px 12px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-top: 10px;
  line-height: 1.5;
}
.guide-action {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.guide-action .action-btn { flex: 1; justify-content: center; }

/* dark mode prep — light only for now */
</style>
</head>
<body>

<header class="app-header">
  <div class="app-header__row">
    <div class="app-header__title">
      <div class="app-header__logo">Q</div>
      <div>QLTKCK</div>
    </div>
    <div class="app-header__actions">
      <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Mở file">📂</button>
      <button class="icon-btn" onclick="exportJson()" title="Xuất file">💾</button>
      <button class="icon-btn icon-btn--accent" onclick="showAddToHome()" title="Thêm vào màn hình chính">📲</button>
      <button class="icon-btn" onclick="showHelp()" title="Trợ giúp">❓</button>
    </div>
  </div>
  <div class="app-header__file">
    <span class="dot empty" id="fileDot"></span>
    <span id="fileMeta">Chưa có file dữ liệu</span>
  </div>
  <input type="file" id="fileInput" accept=".json,application/json" onchange="handleFile(this.files[0])">
</header>

<nav class="tabs" id="tabs">
  <button class="tab active" data-tab="tasks">
    <span class="tab__icon">📋</span>
    <span class="tab__label">CV <span class="tab__count" id="cnt-tasks">0</span></span>
  </button>
  <button class="tab" data-tab="personal">
    <span class="tab__icon">✏️</span>
    <span class="tab__label">Cá nhân <span class="tab__count" id="cnt-personal">0</span></span>
  </button>
  <button class="tab" data-tab="tracking">
    <span class="tab__icon">👁</span>
    <span class="tab__label">Theo dõi <span class="tab__count" id="cnt-tracking">0</span></span>
  </button>
</nav>

<div class="filters" id="filters"></div>

<div class="active-filters" id="activeFilters" style="display:none;"></div>

<div class="search">
  <div class="search__wrap">
    <span class="search__icon">🔍</span>
    <input type="search" class="search__input" id="searchBox" placeholder="Tìm kiếm..." oninput="render()">
  </div>
</div>

<main id="content"></main>

<button class="fab" onclick="openEditor(null)" aria-label="Thêm">＋</button>

<div class="install-hint" id="installHint">
  <div>📲</div>
  <div class="install-hint__text">Bấm <b>Cài đặt</b> để thêm vào màn hình chính như app thật.</div>
  <button class="install-hint__close" id="installBtn">Cài</button>
  <button class="install-hint__close" onclick="dismissInstallHint()">✕</button>
</div>

<!-- Advanced filter modal -->
<div class="modal-backdrop" id="advFilterModal" onclick="if(event.target===this)closeAdvFilter()">
  <div class="modal">
    <div class="modal__handle"></div>
    <div class="modal__head">
      <div class="modal__title">⚙ Lọc & Sắp xếp</div>
      <button class="icon-btn" style="background: var(--surface-2); color: var(--ink-2);" onclick="closeAdvFilter()">✕</button>
    </div>
    <div class="modal__body" id="advFilterBody"></div>
    <div class="modal__footer">
      <button class="action-btn action-btn--ghost" onclick="resetAdvFilters()">↺ Đặt lại</button>
      <button class="action-btn action-btn--primary" onclick="closeAdvFilter()">✓ Áp dụng</button>
    </div>
  </div>
</div>

<!-- Editor modal -->
<div class="modal-backdrop" id="editorModal" onclick="if(event.target===this)closeEditor()">
  <div class="modal">
    <div class="modal__handle"></div>
    <div class="modal__head">
      <div class="modal__title" id="editorTitle">Thêm</div>
      <button class="icon-btn" style="background: var(--surface-2); color: var(--ink-2);" onclick="closeEditor()">✕</button>
    </div>
    <div class="modal__body" id="editorFields"></div>
    <div class="modal__footer">
      <button class="action-btn action-btn--danger" id="deleteBtn" onclick="deleteCurrent()" style="display:none;">🗑 Xóa</button>
      <button class="action-btn action-btn--ghost" onclick="closeEditor()">Hủy</button>
      <button class="action-btn action-btn--primary" onclick="saveEditor()">Lưu</button>
    </div>
  </div>
</div>

<!-- Add-to-Home guide modal -->
<div class="modal-backdrop" id="homeGuideModal" onclick="if(event.target===this)closeHomeGuide()">
  <div class="modal">
    <div class="modal__handle"></div>
    <div class="modal__head">
      <div class="modal__title">📲 Thêm vào màn hình chính</div>
      <button class="icon-btn" style="background: var(--surface-2); color: var(--ink-2);" onclick="closeHomeGuide()">✕</button>
    </div>
    <div class="modal__body" id="homeGuideBody"></div>
    <div class="modal__footer">
      <button class="action-btn action-btn--ghost" onclick="closeHomeGuide()">Đóng</button>
      <button class="action-btn action-btn--primary" id="homeGuideAction">Cài đặt ngay</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
// ============================================================
// QLTKCK Mobile PWA — v2 (polished, full filters)
// ============================================================

const STORAGE_KEY = 'qltkck_pwa_v2';

let data = {
  version: 2,
  tasks: [],
  personalTasks: [],
  trackingIssues: [],
  personalNotes: [],
  inboxItems: [],
  goals: [],
  weeklyReviews: [],
  habits: [],
  reviews: {},
  skipReviews: {}
};

let currentTab = 'tasks';
let filters = {
  tasks: 'todo',     // all | todo | doing | done
  personal: 'todo',  // all | todo | done | star
  tracking: 'active' // all | active | done
};

// Advanced filters for the tasks tab
let advFilters = {
  duan: '',     // selected dự án (empty = all)
  nguoi: '',    // selected nhân viên
  thang: '',    // selected tháng
};
// Sort for tasks tab
let taskSort = {
  field: 'thoihan',  // thoihan | ketthuc | dukien | trangthai | nguoi | duan | none
  dir: 'asc'         // asc | desc
};
let editing = null;
let lastFileName = '';

// ============ STORAGE ============
function saveLocal() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    if (lastFileName) localStorage.setItem(STORAGE_KEY + '_filename', lastFileName);
  } catch(e) {}
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d) {
        data = Object.assign(data, d);
        lastFileName = localStorage.getItem(STORAGE_KEY + '_filename') || '';
        return true;
      }
    }
  } catch(e) {}
  return false;
}

// ============ NORMALIZATION ============
function normalizeTask(t) {
  if (!t || typeof t !== 'object') return t;
  if (t.stt !== undefined && t.stt !== null) t.stt = String(t.stt);
  return t;
}

// ============ UTILITIES ============
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function parseTaskDate(str) {
  if (!str) return null;
  const m = String(str).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  const d = new Date(str);
  return isNaN(d) ? null : d;
}
function fmtDate(d) {
  if (!d) return '';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}/${mm}/${d.getFullYear()}`;
}
function daysUntil(dateStr) {
  const d = parseTaskDate(dateStr);
  if (!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}
function dueLabel(dateStr) {
  const d = daysUntil(dateStr);
  if (d === null) return '';
  if (d < 0)  return `<span class="pill pill--overdue">⚠ Quá hạn ${Math.abs(d)} ngày</span>`;
  if (d === 0) return `<span class="pill pill--today">📅 Hôm nay</span>`;
  if (d === 1) return `<span class="pill pill--soon">📅 Mai</span>`;
  if (d <= 3)  return `<span class="pill pill--soon">📅 ${d} ngày</span>`;
  return `<span class="pill pill--soon">📅 ${dateStr}</span>`;
}

// ============ FILE I/O ============
function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const json = JSON.parse(e.target.result);
      data.tasks = Array.isArray(json.tasks) ? json.tasks.map(normalizeTask) : [];
      data.personalTasks = Array.isArray(json.personalTasks) ? json.personalTasks.map(normalizeTask) : [];
      data.trackingIssues = Array.isArray(json.trackingIssues) ? json.trackingIssues : [];
      data.personalNotes = Array.isArray(json.personalNotes) ? json.personalNotes : [];
      data.inboxItems = Array.isArray(json.inboxItems) ? json.inboxItems : [];
      data.goals = Array.isArray(json.goals) ? json.goals : [];
      data.weeklyReviews = Array.isArray(json.weeklyReviews) ? json.weeklyReviews : [];
      data.habits = Array.isArray(json.habits) ? json.habits : [];
      data.reviews = json.reviews || {};
      data.skipReviews = json.skipReviews || {};
      data.version = json.version || 2;
      lastFileName = file.name;
      saveLocal();
      updateMeta();
      render();
      toast(`✓ ${data.tasks.length} CV · ${data.personalTasks.length} cá nhân · ${data.trackingIssues.length} theo dõi`);
    } catch(err) {
      toast('Lỗi đọc file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function exportJson() {
  data.savedAt = new Date().toISOString();
  data.tasks = data.tasks.map(normalizeTask);
  data.personalTasks = data.personalTasks.map(normalizeTask);
  saveLocal();

  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = lastFileName || 'QLTKCK_data.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('✓ Đã xuất file. Upload lên OneDrive để đồng bộ.');
}

function updateMeta() {
  const total = data.tasks.length + data.personalTasks.length + data.trackingIssues.length;
  document.getElementById('fileMeta').textContent =
    lastFileName ? `${lastFileName} · ${total} mục` : 'Chưa có file dữ liệu — bấm 📂 để mở';
  document.getElementById('fileDot').classList.toggle('empty', !lastFileName);
  // Update tab counts
  document.getElementById('cnt-tasks').textContent = data.tasks.length;
  document.getElementById('cnt-personal').textContent = data.personalTasks.length;
  document.getElementById('cnt-tracking').textContent = data.trackingIssues.length;
}

// ============ TABS ============
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    currentTab = t.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
    document.getElementById('searchBox').value = '';
    render();
  };
});

// ============ FILTERS ============
function getFilterDefs() {
  if (currentTab === 'tasks') {
    const todo = data.tasks.filter(t => t.trangthai === 'Chưa làm' || !t.trangthai).length;
    const doing = data.tasks.filter(t => t.trangthai === 'Đang làm').length;
    const done = data.tasks.filter(t => t.trangthai === 'Hoàn thành').length;
    return [
      { key: 'all',   label: 'Tất cả', count: data.tasks.length },
      { key: 'todo',  label: '○ Chưa làm', count: todo },
      { key: 'doing', label: '▶ Đang làm', count: doing },
      { key: 'done',  label: '✓ Hoàn thành', count: done }
    ];
  } else if (currentTab === 'personal') {
    const todo = data.personalTasks.filter(t => !t.done).length;
    const done = data.personalTasks.filter(t => t.done).length;
    const star = data.personalTasks.filter(t => t.star && !t.done).length;
    return [
      { key: 'all',  label: 'Tất cả', count: data.personalTasks.length },
      { key: 'todo', label: '○ Chưa xong', count: todo },
      { key: 'star', label: '★ Quan trọng', count: star },
      { key: 'done', label: '✓ Đã xong',    count: done }
    ];
  } else {
    const active = data.trackingIssues.filter(t => !t.done).length;
    const done = data.trackingIssues.filter(t => t.done).length;
    return [
      { key: 'all',    label: 'Tất cả', count: data.trackingIssues.length },
      { key: 'active', label: '👁 Đang theo dõi', count: active },
      { key: 'done',   label: '✓ Đã xong',       count: done }
    ];
  }
}

function renderFilters() {
  const defs = getFilterDefs();
  const cur = filters[currentTab === 'personal' ? 'personal' : currentTab];
  // ensure current filter still exists
  const exists = defs.some(d => d.key === cur);
  if (!exists) {
    filters[currentTab === 'personal' ? 'personal' : currentTab] = 'all';
  }
  const f = filters[currentTab === 'personal' ? 'personal' : currentTab];
  let html = '';
  defs.forEach(d => {
    html += `<button class="chip ${d.key === f ? 'active' : ''}" onclick="setFilter('${d.key}')">${d.label}<span class="chip__count">${d.count}</span></button>`;
  });
  // Add advanced filter button only for tasks tab
  if (currentTab === 'tasks') {
    const hasAct = !!(advFilters.duan || advFilters.nguoi || advFilters.thang) || (taskSort.field !== 'thoihan' || taskSort.dir !== 'asc');
    html += `<button class="chip chip--adv ${hasAct ? 'has-active' : ''}" onclick="openAdvFilter()">⚙ Lọc & Sắp xếp${hasAct ? ' •' : ''}</button>`;
  }
  document.getElementById('filters').innerHTML = html;
  renderActiveFilterStrip();
}

function renderActiveFilterStrip() {
  const el = document.getElementById('activeFilters');
  if (currentTab !== 'tasks') {
    el.style.display = 'none';
    return;
  }
  const chips = [];
  if (advFilters.duan)  chips.push({ label: '📁 ' + advFilters.duan,  key: 'duan' });
  if (advFilters.nguoi) chips.push({ label: '👤 ' + advFilters.nguoi, key: 'nguoi' });
  if (advFilters.thang) chips.push({ label: '🗓 ' + advFilters.thang, key: 'thang' });

  if (taskSort.field !== 'thoihan' || taskSort.dir !== 'asc') {
    const fl = sortFieldLabel(taskSort.field);
    const dirIcon = taskSort.dir === 'asc' ? '↑' : '↓';
    chips.push({ label: `↕ ${fl} ${dirIcon}`, key: 'sort' });
  }

  if (chips.length === 0) {
    el.style.display = 'none';
    el.innerHTML = '';
    return;
  }
  el.style.display = 'flex';
  let html = '';
  chips.forEach(c => {
    html += `<div class="active-filter-chip">${escapeHtml(c.label)}<span class="active-filter-chip__x" onclick="clearActiveFilter('${c.key}')">✕</span></div>`;
  });
  html += `<button class="active-filter-chip__clear" onclick="resetAdvFilters(true)">Xóa tất cả</button>`;
  el.innerHTML = html;
}

function sortFieldLabel(field) {
  const map = {
    thoihan: 'Thời hạn (deadline)',
    ketthuc: 'Ngày kết thúc',
    dukien:  'Ngày dự kiến',
    trangthai: 'Trạng thái',
    nguoi:   'Nhân sự',
    duan:    'Dự án',
    none:    'Mặc định'
  };
  return map[field] || field;
}

function clearActiveFilter(key) {
  if (key === 'sort') {
    taskSort = { field: 'thoihan', dir: 'asc' };
  } else if (key in advFilters) {
    advFilters[key] = '';
  }
  render();
}

function setFilter(key) {
  filters[currentTab === 'personal' ? 'personal' : currentTab] = key;
  render();
}

// ============ ADVANCED FILTER UI ============
function openAdvFilter() {
  const body = document.getElementById('advFilterBody');

  // Compute unique values from data
  const duans = [...new Set(data.tasks.map(t => t.duan).filter(Boolean))].sort();
  const nguois = [...new Set(data.tasks.map(t => t.nguoi).filter(Boolean))].sort();
  const thangs = [...new Set(data.tasks.map(t => t.thang).filter(Boolean))].sort();

  const duanCount = (v) => data.tasks.filter(t => t.duan === v).length;
  const nguoiCount = (v) => data.tasks.filter(t => t.nguoi === v).length;
  const thangCount = (v) => data.tasks.filter(t => t.thang === v).length;

  let html = '';

  // SORT
  html += `<div class="adv-section">
    <div class="adv-section__title">↕ Sắp xếp theo</div>
    <div class="sort-row">
      <select class="sort-select" id="advSortField">
        <option value="thoihan"   ${taskSort.field==='thoihan'?'selected':''}>📅 Thời hạn (deadline)</option>
        <option value="ketthuc"   ${taskSort.field==='ketthuc'?'selected':''}>✓ Ngày kết thúc</option>
        <option value="dukien"    ${taskSort.field==='dukien'?'selected':''}>🎯 Ngày dự kiến</option>
        <option value="trangthai" ${taskSort.field==='trangthai'?'selected':''}>● Trạng thái</option>
        <option value="nguoi"     ${taskSort.field==='nguoi'?'selected':''}>👤 Nhân sự</option>
        <option value="duan"      ${taskSort.field==='duan'?'selected':''}>📁 Dự án</option>
        <option value="none"      ${taskSort.field==='none'?'selected':''}>— Theo thứ tự gốc</option>
      </select>
      <button class="sort-dir" id="advSortDir" onclick="toggleSortDir()">${taskSort.dir==='asc'?'↑':'↓'}</button>
    </div>
  </div>`;

  // FILTER: Dự án
  html += `<div class="adv-section">
    <div class="adv-section__title">📁 Dự án</div>
    <div class="adv-options">
      <button class="adv-opt ${!advFilters.duan?'active':''}" onclick="setAdv('duan','')">Tất cả <span class="adv-opt__count">${data.tasks.length}</span></button>`;
  duans.forEach(d => {
    html += `<button class="adv-opt ${advFilters.duan===d?'active':''}" onclick="setAdv('duan', ${JSON.stringify(d)})">${escapeHtml(d)} <span class="adv-opt__count">${duanCount(d)}</span></button>`;
  });
  html += `</div></div>`;

  // FILTER: Nhân viên
  html += `<div class="adv-section">
    <div class="adv-section__title">👤 Nhân viên</div>
    <div class="adv-options">
      <button class="adv-opt ${!advFilters.nguoi?'active':''}" onclick="setAdv('nguoi','')">Tất cả</button>`;
  nguois.forEach(n => {
    html += `<button class="adv-opt ${advFilters.nguoi===n?'active':''}" onclick="setAdv('nguoi', ${JSON.stringify(n)})">${escapeHtml(n)} <span class="adv-opt__count">${nguoiCount(n)}</span></button>`;
  });
  if (nguois.length === 0) html += `<div style="color:var(--ink-3);font-size:13px;padding:4px 0;">Chưa có nhân viên nào trong dữ liệu</div>`;
  html += `</div></div>`;

  // FILTER: Tháng
  html += `<div class="adv-section">
    <div class="adv-section__title">🗓 Tháng</div>
    <div class="adv-options">
      <button class="adv-opt ${!advFilters.thang?'active':''}" onclick="setAdv('thang','')">Tất cả</button>`;
  thangs.forEach(m => {
    html += `<button class="adv-opt ${advFilters.thang===m?'active':''}" onclick="setAdv('thang', ${JSON.stringify(m)})">${escapeHtml(m)} <span class="adv-opt__count">${thangCount(m)}</span></button>`;
  });
  if (thangs.length === 0) html += `<div style="color:var(--ink-3);font-size:13px;padding:4px 0;">Chưa có tháng nào trong dữ liệu</div>`;
  html += `</div></div>`;

  body.innerHTML = html;
  document.getElementById('advFilterModal').classList.add('show');

  // Bind sort field
  document.getElementById('advSortField').onchange = function() {
    taskSort.field = this.value;
    render();
  };
}

function toggleSortDir() {
  taskSort.dir = (taskSort.dir === 'asc' ? 'desc' : 'asc');
  document.getElementById('advSortDir').textContent = taskSort.dir === 'asc' ? '↑' : '↓';
  render();
}

function setAdv(field, value) {
  advFilters[field] = value;
  // Re-render the modal options to reflect selection without closing
  openAdvFilter();
  render();
}

function resetAdvFilters(closeModal) {
  advFilters = { duan: '', nguoi: '', thang: '' };
  taskSort = { field: 'thoihan', dir: 'asc' };
  if (closeModal) {
    closeAdvFilter();
  } else if (document.getElementById('advFilterModal').classList.contains('show')) {
    openAdvFilter();
  }
  render();
}

function closeAdvFilter() {
  document.getElementById('advFilterModal').classList.remove('show');
}

// ============ RENDER ============
function matchSearch(text, q) {
  if (!q) return true;
  return String(text || '').toLowerCase().includes(q);
}

function priorityClass(t) {
  if (t.trangthai === 'Hoàn thành' || t.done) return 'task--done';
  const dpt = Number(t.dpt);
  if (t.priority === 'urgent' || t.priority === 'high' || dpt === 1) return 'task--urgent';
  if (t.priority === 'low' || dpt >= 3) return 'task--low';
  return 'task--normal';
}

function statusPill(s) {
  if (s === 'Hoàn thành') return '<span class="pill pill--done">✓ Hoàn thành</span>';
  if (s === 'Đang làm')   return '<span class="pill pill--doing">▶ Đang làm</span>';
  return '<span class="pill pill--todo">○ Chưa làm</span>';
}

function priorityPill(p) {
  const map = {
    urgent: '<span class="pill pill--overdue">🔴 Gấp</span>',
    high:   '<span class="pill pill--overdue">🔴 Gấp</span>',
    normal: '<span class="pill pill--today">🟡 Bình thường</span>',
    medium: '<span class="pill pill--today">🟡 Bình thường</span>',
    low:    '<span class="pill pill--done">🟢 Không gấp</span>'
  };
  return map[p] || '';
}

function render() {
  renderFilters();
  const root = document.getElementById('content');
  const search = document.getElementById('searchBox').value.toLowerCase().trim();
  if (currentTab === 'tasks') renderTasks(root, search);
  else if (currentTab === 'personal') renderPersonal(root, search);
  else renderTracking(root, search);
}

// ===== TASKS =====
function renderTasks(root, q) {
  const f = filters.tasks;
  let list = data.tasks.slice();
  if (f === 'todo')  list = list.filter(t => t.trangthai === 'Chưa làm' || !t.trangthai);
  else if (f === 'doing') list = list.filter(t => t.trangthai === 'Đang làm');
  else if (f === 'done')  list = list.filter(t => t.trangthai === 'Hoàn thành');

  // Advanced filters: dự án, nhân viên, tháng
  if (advFilters.duan)  list = list.filter(t => t.duan === advFilters.duan);
  if (advFilters.nguoi) list = list.filter(t => t.nguoi === advFilters.nguoi);
  if (advFilters.thang) list = list.filter(t => t.thang === advFilters.thang);

  if (q) {
    list = list.filter(t =>
      matchSearch(t.congviec, q) ||
      matchSearch(t.duan, q) ||
      matchSearch(t.nguoi, q) ||
      matchSearch(t.congdoan, q));
  }

  // Apply sort
  applyTaskSort(list);

  if (list.length === 0) {
    root.innerHTML = emptyHtml('📋', 'Không có công việc nào', q ? 'Không tìm thấy kết quả phù hợp' : (data.tasks.length === 0 ? 'Mở file JSON để bắt đầu' : 'Thử bộ lọc khác'));
    return;
  }

  // Determine grouping: skip grouping when sorted by something specific
  const groupBy = (taskSort.field === 'duan' || taskSort.field === 'thoihan' || taskSort.field === 'none') ? 'duan' :
                  (taskSort.field === 'nguoi') ? 'nguoi' :
                  (taskSort.field === 'trangthai') ? 'trangthai' :
                  null;

  let html = '';

  if (groupBy) {
    // Group by chosen field, preserving sorted order within each group
    const groups = new Map(); // preserve insertion order
    const groupLabel = {
      duan: '(Không có dự án)',
      nguoi: '(Chưa giao)',
      trangthai: '(Không trạng thái)'
    };
    list.forEach(t => {
      const k = t[groupBy] || groupLabel[groupBy];
      if (!groups.has(k)) groups.set(k, []);
      groups.get(k).push(t);
    });
    groups.forEach((items, g) => {
      html += `<div class="group">
        <div class="group__header">
          ${groupBy === 'duan' ? '📁 ' : groupBy === 'nguoi' ? '👤 ' : '● '}${escapeHtml(g)}
          <span class="group__count">${items.length}</span>
        </div>`;
      items.forEach(t => { html += renderTaskCard(t); });
      html += '</div>';
    });
  } else {
    // Flat list (no grouping when sorting by date fields)
    list.forEach(t => { html += renderTaskCard(t); });
  }

  root.innerHTML = html;
}

function renderTaskCard(t) {
  const idx = data.tasks.indexOf(t);
  return `<div class="task ${priorityClass(t)}">
    <div class="task__top">
      <div class="task__title">${escapeHtml(t.congviec || '(Không tiêu đề)')}</div>
    </div>
    <div class="task__meta">
      ${statusPill(t.trangthai)}
      ${t.duan ? `<span class="meta-item"><span class="meta-item__icon">📁</span>${escapeHtml(t.duan)}</span>` : ''}
      ${t.congdoan ? `<span class="meta-item"><span class="meta-item__icon">📌</span>${escapeHtml(t.congdoan)}</span>` : ''}
      ${t.nguoi ? `<span class="meta-item"><span class="meta-item__icon">👤</span>${escapeHtml(t.nguoi)}</span>` : ''}
      ${t.thoihan ? `<span class="meta-item"><span class="meta-item__icon">📅</span>${escapeHtml(t.thoihan)}</span>` : ''}
      ${t.dukien ? `<span class="meta-item"><span class="meta-item__icon">🎯</span>${escapeHtml(t.dukien)}</span>` : ''}
      ${t.ketthuc ? `<span class="meta-item"><span class="meta-item__icon">✓</span>${escapeHtml(t.ketthuc)}</span>` : ''}
      ${t.phanloai ? `<span class="meta-item"><span class="meta-item__icon">🏷</span>${escapeHtml(t.phanloai)}</span>` : ''}
    </div>
    ${t.ghichu ? `<div class="task__sub">${escapeHtml(t.ghichu)}</div>` : ''}
    <div class="task__actions">
      <button class="action-btn action-btn--ghost" onclick="openEditor({kind:'tasks',index:${idx}})">📝 Chi tiết</button>
      ${t.trangthai !== 'Hoàn thành' ? `<button class="action-btn action-btn--success" onclick="markDoneTask(${idx})">✓ Xong</button>` : `<button class="action-btn action-btn--warn" onclick="reopenTask(${idx})">↺ Mở lại</button>`}
    </div>
  </div>`;
}

// ===== SORT =====
function applyTaskSort(list) {
  const field = taskSort.field;
  const dirMul = taskSort.dir === 'asc' ? 1 : -1;
  if (field === 'none') return;

  // status order
  const statusRank = (s) => {
    if (s === 'Đang làm') return 0;
    if (s === 'Chưa làm' || !s) return 1;
    if (s === 'Hoàn thành') return 2;
    return 3;
  };

  list.sort((a, b) => {
    let cmp = 0;
    if (field === 'thoihan' || field === 'ketthuc' || field === 'dukien') {
      const da = parseTaskDate(a[field]);
      const db = parseTaskDate(b[field]);
      // null dates always go to end (regardless of dir)
      if (!da && !db) cmp = 0;
      else if (!da) return 1;
      else if (!db) return -1;
      else cmp = da - db;
    } else if (field === 'trangthai') {
      cmp = statusRank(a.trangthai) - statusRank(b.trangthai);
    } else if (field === 'nguoi') {
      cmp = String(a.nguoi || '').localeCompare(String(b.nguoi || ''), 'vi');
    } else if (field === 'duan') {
      cmp = String(a.duan || '').localeCompare(String(b.duan || ''), 'vi');
    }
    return cmp * dirMul;
  });
}

// ===== PERSONAL =====
function renderPersonal(root, q) {
  const f = filters.personal;
  let list = data.personalTasks.slice();
  if (f === 'todo') list = list.filter(t => !t.done);
  else if (f === 'done') list = list.filter(t => t.done);
  else if (f === 'star') list = list.filter(t => t.star && !t.done);

  if (q) {
    list = list.filter(t =>
      matchSearch(t.title, q) ||
      matchSearch(t.note, q) ||
      matchSearch(t.purpose, q));
  }

  // Sort: star first, then by due date
  list.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (!!a.star !== !!b.star) return a.star ? -1 : 1;
    const da = daysUntil(a.due), db = daysUntil(b.due);
    if (da === null && db === null) return 0;
    if (da === null) return 1;
    if (db === null) return -1;
    return da - db;
  });

  if (list.length === 0) {
    root.innerHTML = emptyHtml('✏️', 'Chưa có task cá nhân', q ? 'Không tìm thấy kết quả' : 'Bấm + để thêm');
    return;
  }

  let html = '';
  list.forEach(t => {
    const idx = data.personalTasks.indexOf(t);
    let cls = priorityClass(t);
    if (t.star && !t.done) cls += ' task--star';
    const subs = Array.isArray(t.subs) ? t.subs : [];
    const subsDone = subs.filter(s => s.done).length;

    html += `<div class="task ${cls}">
      <div class="task__top">
        <div class="task__title">${escapeHtml(t.title || '(Không tiêu đề)')}</div>
        ${t.star ? '<div class="task__star">★</div>' : ''}
      </div>
      <div class="task__meta">
        ${priorityPill(t.priority)}
        ${t.due ? dueLabel(t.due) : ''}
        ${t.purpose ? `<span class="meta-item"><span class="meta-item__icon">🎯</span>${escapeHtml(t.purpose)}</span>` : ''}
        ${subs.length ? `<span class="meta-item"><span class="meta-item__icon">📋</span>${subsDone}/${subs.length}</span>` : ''}
      </div>
      ${t.note ? `<div class="task__sub">${escapeHtml(t.note)}</div>` : ''}
      ${subs.length ? renderSubs(t.id, subs) : ''}
      <div class="task__actions">
        <button class="action-btn action-btn--ghost" onclick="openEditor({kind:'personalTasks',index:${idx}})">📝 Sửa</button>
        <button class="action-btn ${t.done ? 'action-btn--warn' : 'action-btn--success'}" onclick="togglePersonalDone(${idx})">${t.done ? '↺ Mở lại' : '✓ Xong'}</button>
      </div>
    </div>`;
  });
  root.innerHTML = html;
}

function renderSubs(taskId, subs) {
  let html = '<div class="task__subs">';
  subs.forEach(s => {
    html += `<div class="subitem ${s.done ? 'subitem--done' : ''}">
      <div class="subitem__check" onclick="toggleSubtask('${taskId}','${s.id}')">${s.done ? '✓' : ''}</div>
      <div class="subitem__text">${escapeHtml(s.text)}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function toggleSubtask(taskId, subId) {
  const t = data.personalTasks.find(x => String(x.id) === String(taskId));
  if (!t || !t.subs) return;
  const s = t.subs.find(x => String(x.id) === String(subId));
  if (!s) return;
  s.done = !s.done;
  saveLocal();
  render();
}

// ===== TRACKING =====
function renderTracking(root, q) {
  const f = filters.tracking;
  let list = data.trackingIssues.slice();
  if (f === 'active') list = list.filter(t => !t.done);
  else if (f === 'done') list = list.filter(t => t.done);

  if (q) {
    list = list.filter(t =>
      matchSearch(t.content, q) ||
      matchSearch(t.note, q) ||
      matchSearch(t.target, q));
  }

  // Sort: not done first, then by remindDate
  list.sort((a, b) => {
    if (!!a.done !== !!b.done) return a.done ? 1 : -1;
    const da = daysUntil(a.remindDate), db = daysUntil(b.remindDate);
    if (da === null && db === null) return 0;
    if (da === null) return 1;
    if (db === null) return -1;
    return da - db;
  });

  if (list.length === 0) {
    root.innerHTML = emptyHtml('👁', 'Không có mục theo dõi', q ? 'Không tìm thấy kết quả' : 'Bấm + để thêm');
    return;
  }

  let html = '';
  list.forEach(t => {
    const idx = data.trackingIssues.indexOf(t);
    let cls = t.done ? 'task--done' : (t.priority === 'high' ? 'task--urgent' : t.priority === 'low' ? 'task--low' : 'task--normal');
    html += `<div class="task ${cls}">
      <div class="task__title">${escapeHtml(t.content || '(Không nội dung)')}</div>
      <div class="task__meta">
        ${priorityPill(t.priority || 'medium')}
        ${t.remindDate ? dueLabel(t.remindDate) : ''}
        ${t.target ? `<span class="meta-item"><span class="meta-item__icon">🎯</span>${escapeHtml(t.target)}</span>` : ''}
      </div>
      ${t.purpose ? `<div class="task__sub"><b>Mục đích:</b> ${escapeHtml(t.purpose)}</div>` : ''}
      ${t.note ? `<div class="task__sub">${escapeHtml(t.note)}</div>` : ''}
      <div class="task__actions">
        <button class="action-btn action-btn--ghost" onclick="openEditor({kind:'trackingIssues',index:${idx}})">📝 Sửa</button>
        <button class="action-btn ${t.done ? 'action-btn--warn' : 'action-btn--success'}" onclick="toggleTrackingDone(${idx})">${t.done ? '↺ Mở lại' : '✓ Xong'}</button>
      </div>
    </div>`;
  });
  root.innerHTML = html;
}

function emptyHtml(icon, title, hint) {
  return `<div class="empty">
    <div class="empty__icon">${icon}</div>
    <div class="empty__title">${escapeHtml(title)}</div>
    <div class="empty__hint">${escapeHtml(hint || '')}</div>
  </div>`;
}

// ============ ACTIONS ============
function markDoneTask(idx) {
  data.tasks[idx].trangthai = 'Hoàn thành';
  if (!data.tasks[idx].ketthuc) data.tasks[idx].ketthuc = fmtDate(new Date());
  saveLocal(); render(); toast('✓ Đã hoàn thành');
}
function reopenTask(idx) {
  data.tasks[idx].trangthai = 'Đang làm';
  saveLocal(); render(); toast('↺ Đã mở lại');
}
function togglePersonalDone(idx) {
  data.personalTasks[idx].done = !data.personalTasks[idx].done;
  saveLocal(); render();
}
function toggleTrackingDone(idx) {
  data.trackingIssues[idx].done = !data.trackingIssues[idx].done;
  saveLocal(); render();
}

function deleteCurrent() {
  if (!editing) return;
  if (!confirm('Xóa mục này?')) return;
  data[editing.kind].splice(editing.index, 1);
  saveLocal();
  closeEditor();
  render();
  toast('🗑 Đã xóa');
}

        <label class="field__label">Mục đích</label>
        <input class="field__input" id="ed-purpose" value="${escapeHtml(item?.purpose)}">
      </div>
      <div class="field">
        <label class="field__label">Độ ưu tiên</label>
        <div class="priority-pills">
          <input type="radio" name="ed-pri" id="trpri-u" value="high" ${item?.priority==='high'?'checked':''}><label class="p-urgent" for="trpri-u">🔴 Gấp</label>
          <input type="radio" name="ed-pri" id="trpri-n" value="medium" ${(!item || item?.priority==='medium' || !item?.priority)?'checked':''}><label class="p-normal" for="trpri-n">🟡 BT</label>
          <input type="radio" name="ed-pri" id="trpri-l" value="low" ${item?.priority==='low'?'checked':''}><label class="p-low" for="trpri-l">🟢 Nhẹ</label>
        </div>
      </div>
      <div class="field">
        <label class="field__label">Ngày nhắc (dd/mm/yyyy)</label>
        <input class="field__input" id="ed-remindDate" value="${escapeHtml(item?.remindDate)}">
      </div>
      <div class="field">
        <label class="field__label">Ghi chú</label>
        <textarea class="field__textarea" id="ed-note">${escapeHtml(item?.note)}</textarea>
      </div>
    `;
  }
  document.getElementById('editorFields').innerHTML = html;
  document.getElementById('editorModal').classList.add('show');
}

function tabLabel(kind) {
  return kind === 'tasks' ? 'công việc' : kind === 'personalTasks' ? 'task cá nhân' : 'mục theo dõi';
}

function closeEditor() {
  document.getElementById('editorModal').classList.remove('show');
  editing = null;
}

function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function numVal(id) { const v = val(id); return v === '' ? '' : Number(v); }

function saveEditor() {
  const kind = editing ? editing.kind : (currentTab === 'tasks' ? 'tasks' : currentTab === 'personal' ? 'personalTasks' : 'trackingIssues');
  const target = editing;
  let item;

  if (kind === 'tasks') {
    if (!val('ed-congviec')) return toast('Nhập tên công việc');
    const orig = target ? data.tasks[target.index] : {};
    item = {
      ...orig,
      congviec: val('ed-congviec'),
      duan: val('ed-duan'),
      congdoan: val('ed-congdoan'),
      nguoi: val('ed-nguoi'),
      phanloai: val('ed-phanloai'),
      thang: val('ed-thang'),
      maduan: val('ed-maduan'),
      stt: String(val('ed-stt')),
      thoihan: val('ed-thoihan'),
      ketthuc: val('ed-ketthuc'),
      trangthai: val('ed-trangthai') || 'Chưa làm',
      chatluong: val('ed-chatluong'),
      dpt: numVal('ed-dpt'),
      gkh: numVal('ed-gkh'),
      gtt: numVal('ed-gtt'),
      ghichu: val('ed-ghichu')
    };
    item = normalizeTask(item);
  } else if (kind === 'personalTasks') {
    if (!val('ed-title')) return toast('Nhập tiêu đề');
    const pri = document.querySelector('input[name="ed-pri"]:checked')?.value || 'normal';
    const orig = target ? data.personalTasks[target.index] : {};
    item = {
      ...orig,
      id: orig.id || Date.now(),
      title: val('ed-title'),
      purpose: val('ed-purpose'),
      priority: pri,
      due: val('ed-due'),
      note: val('ed-note'),
      star: document.getElementById('ed-star').checked,
      done: orig.done || false,
      subs: orig.subs || [],
      createdAt: orig.createdAt || new Date().toISOString()
    };
  } else if (kind === 'trackingIssues') {
    if (!val('ed-content')) return toast('Nhập nội dung');
    const pri = document.querySelector('input[name="ed-pri"]:checked')?.value || 'medium';
    const orig = target ? data.trackingIssues[target.index] : {};
    item = {
      ...orig,
      id: orig.id || String(Date.now()),
      content: val('ed-content'),
      target: val('ed-target'),
      purpose: val('ed-purpose'),
      priority: pri,
      remindDate: val('ed-remindDate'),
      note: val('ed-note'),
      done: orig.done || false,
      createdAt: orig.createdAt || new Date().toISOString()
    };
  }

  if (target) data[kind][target.index] = item;
  else data[kind].push(item);
  saveLocal();
  closeEditor();
  render();
  updateMeta();
  toast(target ? '✓ Đã cập nhật' : '✓ Đã thêm');
}

// ============ TOAST ============
let _toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2400);
}

// ============ HELP / INSTALL ============

  alert(`📖 HƯỚNG DẪN SỬ DỤNG

1️⃣ Mở file JSON: bấm 📂 → chọn QLTKCK_data.json đã tải từ OneDrive.

2️⃣ Sửa task ở 3 tab: CV / Cá nhân / Theo dõi.

3️⃣ Lọc bằng các chip (Chưa làm / Đang làm / Đã xong...) hoặc bấm ⚙ Lọc & Sắp xếp ở tab CV để lọc theo dự án/nhân viên/tháng.

4️⃣ Xuất file: bấm 💾 → file mới tải về điện thoại.

5️⃣ Upload file đó lên OneDrive (đè file cũ) — desktop sẽ tự đồng bộ.

📲 Thêm vào màn hình chính: bấm icon 📲 vàng trên header.

💾 Dữ liệu tự lưu trong trình duyệt giữa các lần dùng.`);
}

// Detect how page was opened
function detectPageContext() {
  const url = location.href;
  return {
    isFile: url.startsWith('file:') || url.startsWith('content:'),
    isHttp: url.startsWith('http:') || url.startsWith('https:'),
    isStandalone: window.matchMedia && window.matchMedia('(display-mode: standalone)').matches,
    canPrompt: !!_deferredPrompt
  };
}

function showAddToHome() {
  const ctx = detectPageContext();
  const body = document.getElementById('homeGuideBody');
  const action = document.getElementById('homeGuideAction');

  if (ctx.isStandalone) {
    body.innerHTML = `
      <div class="guide-note">
        ✓ Bạn đang chạy app ở chế độ standalone (đã cài) — không cần làm gì thêm!
      </div>`;
    action.style.display = 'none';
    document.getElementById('homeGuideModal').classList.add('show');
    return;
  }

  action.style.display = 'inline-flex';

  if (ctx.canPrompt) {
    // Native install available — best case
    body.innerHTML = `
      <div class="guide-note">
        ✨ Trình duyệt hỗ trợ cài trực tiếp! Bấm <b>Cài đặt ngay</b> bên dưới.
      </div>
      <div class="guide-step" style="margin-top: 14px;">
        <div class="guide-step__num">!</div>
        <div class="guide-step__body">
          Sau khi cài, app sẽ xuất hiện trên màn hình chính như app gốc, không có thanh URL.
        </div>
      </div>`;
    action.textContent = '📲 Cài đặt ngay';
    action.onclick = nativeInstall;
  } else if (ctx.isFile) {
    // File:// or content:// — Chrome blocks PWA install. Need workaround.
    body.innerHTML = `
      <div class="guide-warn">
        ⚠ Bạn đang mở file từ điện thoại. Chrome <b>không cho cài PWA từ file local</b>.<br>Cần dùng 1 trong các cách dưới đây.
      </div>

      <div class="guide-section-title">🥇 Cách 1: Tạo shortcut bằng Files (đơn giản nhất)</div>
      <div class="guide-step">
        <div class="guide-step__num">1</div>
        <div class="guide-step__body">Mở app <b>Files by Google</b> → vào thư mục <b>Download</b></div>
      </div>
      <div class="guide-step">
        <div class="guide-step__num">2</div>
        <div class="guide-step__body">Nhấn giữ file <b>qltkck-mobile-v3.html</b></div>
      </div>
      <div class="guide-step">
        <div class="guide-step__num">3</div>
        <div class="guide-step__body">Chọn <b>"Thêm vào màn hình chính"</b> hoặc <b>"Tạo lối tắt"</b> (nếu có)</div>
      </div>

      <div class="guide-section-title">🥈 Cách 2: Mở qua URL https (cài chuẩn PWA)</div>
      <div class="guide-step">
        <div class="guide-step__num">1</div>
        <div class="guide-step__body">Upload file HTML lên <b>OneDrive</b> hoặc <b>Google Drive</b>, đặt chế độ <b>"Anyone with link"</b></div>
      </div>
      <div class="guide-step">
        <div class="guide-step__num">2</div>
        <div class="guide-step__body">Mở link đó trong Chrome → menu ⋮ → <b>"Cài đặt ứng dụng"</b></div>
      </div>
      <div class="guide-note">
        ℹ Lưu ý: file được host phải kết thúc bằng <code>.html</code>, không phải link xem tài liệu của OneDrive.
      </div>

      <div class="guide-section-title">🥉 Cách 3: Bookmark + ghim shortcut</div>
      <div class="guide-step">
        <div class="guide-step__num">1</div>
        <div class="guide-step__body">Bấm icon <b>☆</b> ở thanh URL Chrome để bookmark trang này</div>
      </div>
      <div class="guide-step">
        <div class="guide-step__num">2</div>
        <div class="guide-step__body">Trang chủ Chrome → <b>Dấu trang</b> → tìm bookmark → nhấn giữ → <b>"Thêm vào Màn hình chính"</b></div>
      </div>`;
    action.textContent = '📋 Sao chép đường dẫn file';
    action.onclick = copyFileUrl;
  } else if (ctx.isHttp) {
    // Generic HTTP — install should work via menu
    body.innerHTML = `
      <div class="guide-section-title">📲 Trên Chrome (Pixel)</div>
      <div class="guide-step">
        <div class="guide-step__num">1</div>
        <div class="guide-step__body">Bấm menu <b>⋮</b> ở góc trên bên phải</div>
      </div>
      <div class="guide-step">
        <div class="guide-step__num">2</div>
        <div class="guide-step__body">Chọn <b>"Cài đặt ứng dụng"</b> hoặc <b>"Thêm vào Màn hình chính"</b></div>
      </div>
      <div class="guide-step">
        <div class="guide-step__num">3</div>
        <div class="guide-step__body">Xác nhận <b>Cài đặt</b> — icon Q vàng sẽ xuất hiện ngay trên màn hình chính</div>
      </div>

      <div class="guide-section-title">🍎 Trên Safari (iOS)</div>
      <div class="guide-step">
        <div class="guide-step__num">1</div>
        <div class="guide-step__body">Bấm icon <b>Share ⬆</b> ở dưới</div>
      </div>
      <div class="guide-step">
        <div class="guide-step__num">2</div>
        <div class="guide-step__body">Chọn <b>"Thêm vào Màn hình chính"</b></div>
      </div>`;
    action.textContent = 'Đã hiểu';
    action.onclick = closeHomeGuide;
  }

  document.getElementById('homeGuideModal').classList.add('show');
}

async function nativeInstall() {
  if (!_deferredPrompt) {
    toast('Trình duyệt chưa sẵn sàng — thử cách thủ công');
    return;
  }
  _deferredPrompt.prompt();
  const { outcome } = await _deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    toast('🎉 Đã thêm vào màn hình chính!');
    closeHomeGuide();
  }
  _deferredPrompt = null;
}

async function copyFileUrl() {
  const url = location.href;
  try {
    await navigator.clipboard.writeText(url);
    toast('✓ Đã sao chép đường dẫn');
  } catch(e) {
    // Fallback: show URL in alert for manual copy
    prompt('Sao chép đường dẫn này:', url);
  }
}

function closeHomeGuide() {
  document.getElementById('homeGuideModal').classList.remove('show');
}

// PWA install prompt (native)
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredPrompt = e;
  // Show install hint after a moment, only once
  setTimeout(() => {
    if (!localStorage.getItem(STORAGE_KEY + '_install_dismissed')) {
      document.getElementById('installHint').classList.add('show');
    }
  }, 3000);
});

document.getElementById('installBtn').onclick = async () => {
  document.getElementById('installHint').classList.remove('show');
  if (_deferredPrompt) {
    nativeInstall();
  } else {
    showAddToHome();
  }
};

function dismissInstallHint() {
  document.getElementById('installHint').classList.remove('show');
  localStorage.setItem(STORAGE_KEY + '_install_dismissed', '1');
}

window.addEventListener('appinstalled', () => {
  document.getElementById('installHint').classList.remove('show');
  toast('🎉 Đã cài thành công!');
});

// Show install banner for file:// users too (since they need manual setup)
setTimeout(() => {
  const ctx = detectPageContext();
  if (ctx.isFile && !ctx.isStandalone &&
      !localStorage.getItem(STORAGE_KEY + '_install_dismissed')) {
    const hint = document.getElementById('installHint');
    hint.querySelector('.install-hint__text').innerHTML =
      'Bấm <b>Hướng dẫn</b> để thêm app vào màn hình chính.';
    hint.querySelector('#installBtn').textContent = 'Hướng dẫn';
    hint.classList.add('show');
  }
}, 2500);

// ============ INIT ============
loadLocal();
updateMeta();
render();
</script>
